<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>FIXSTRA | Pro Algorithmic Desk</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="sidebar">
    <div class="h3 fw-bold mb-5 text-center">FIXSTRA</div>
    <div class="badge bg-dark border border-secondary w-100 p-2 mb-3"><span id="pulse-dot" class="heartbeat-dot"></span><span id="heartbeat-status">INITIALIZING</span></div>
    <div class="badge bg-dark border border-secondary w-100 p-2 mb-3"><span id="tg-status">READY</span></div>
    <div id="last-update" class="label-blue-bg w-100 text-center mt-3">00:00:00</div>
  </div>

  <div class="main-wrapper">
    <div class="summary-card mb-4">
        <div class="label-blue-bg mb-3 w-100">Market Watch (Fixed ₹10k Model)</div>
        <div class="row g-2 px-3" id="watch-grid"></div>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-md-4"><div class="summary-card"><span class="label-blue-bg">Realized P&L</span><div class="h3 fw-bold mt-2" id="realized-val">₹ 0.00</div></div></div>
        <div class="col-md-4"><div class="summary-card"><span class="label-blue-bg">Unrealized P&L</span><div class="h3 fw-bold mt-2" id="unrealized-val">₹ 0.00</div></div></div>
        <div class="col-md-4"><div class="summary-card"><span class="label-blue-bg">Combined Total</span><div class="h3 fw-bold mt-2" id="combined-val">₹ 0.00</div></div></div>
    </div>

    <div class="summary-card text-start">
        <div class="label-blue-bg mb-3">Active (2% SL / 5% TP)</div>
        <table class="table table-dark">
            <thead><tr><th>SYMBOL</th><th>SIDE</th><th>QTY</th><th>PRICE</th><th>SL</th><th>TP</th></tr></thead>
            <tbody id="open-body"></tbody>
        </table>
    </div>

    <div class="summary-card text-start mt-4">
        <div class="label-blue-bg mb-3">Closed Trades (PnL)</div>
        <table class="table table-dark"><tbody id="closed-body"></tbody></table>
    </div>
  </div>

<script>
    const ws = new WebSocket(`ws://${window.location.host}/ws`);
    const fmt = (v) => v ? v.toLocaleString('en-IN', {minimumFractionDigits: 2}) : "0.00";
    ws.onmessage = (event) => {
        const d = JSON.parse(event.data);
        document.getElementById('heartbeat-status').innerText = d.market_status;
        document.getElementById('tg-status').innerText = d.telegram_status;
        document.getElementById('last-update').innerText = d.last_update;

        // FIXED: Updating Restored PnL Summary Cards
        document.getElementById('realized-val').innerText = `₹ ${fmt(d.realized_pnl)}`;
        document.getElementById('unrealized-val').innerText = `₹ ${fmt(d.unrealized_pnl)}`;
        document.getElementById('combined-val').innerText = `₹ ${fmt(d.combined_pnl)}`;

        let openHtml = '';
        for (const s in d.open_positions) {
            const p = d.open_positions[s];
            openHtml += `<tr><td>${s}</td><td>${p.side}</td><td>${p.qty}</td><td>₹ ${fmt(p.avg_price)}</td><td class="text-danger">₹ ${fmt(p.sl)}</td><td class="text-success">₹ ${fmt(p.tp)}</td></tr>`;
        }
        document.getElementById('open-body').innerHTML = openHtml || '<tr><td colspan="6" class="text-center py-4 text-muted">Awaiting Market Move...</td></tr>';
        
        document.getElementById('closed-body').innerHTML = d.closed_trades.map(t => `<tr><td>${t.symbol}</td><td class="${t.pnl >= 0 ? 'text-success':'text-danger'}">₹ ${fmt(t.pnl)}</td><td>Exit: ₹ ${fmt(t.exit_price)}</td></tr>`).join('');

        document.getElementById('watch-grid').innerHTML = Object.entries(d.live_prices).map(([sym, lp]) => `
            <div class="col-md-2 col-6"><div class="watch-card"><b>${sym}</b><br><span style="color: #ffeb3b;">₹ ${fmt(lp)}</span></div></div>
        `).join('');
    };
</script>
</body>
</html>
