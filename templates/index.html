<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>FIXSTRA | Pro Algorithmic Desk</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root { --body-bg: #1a1b26; --sidebar-bg: #13141f; --card-bg: #2b2f42; --border: #343a50; --accent: #3699ff; --success: #50cd89; --danger: #f1416c; --yellow: #ffeb3b; }
    body { background: var(--body-bg); color: #fff; font-family: 'Poppins', sans-serif; margin: 0; }
    .sidebar { width: 240px; background: var(--sidebar-bg); min-height: 100vh; position: fixed; top: 0; left: 0; padding: 25px; border-right: 1px solid var(--border); }
    .nav-item { color: #9194a7; display: flex; align-items: center; padding: 12px 15px; text-decoration: none; font-size: 0.9rem; transition: 0.2s; }
    .nav-item.active { color: #fff; background: #1e202e; border-radius: 8px; position: relative; }
    .nav-item.active::after { content: ''; position: absolute; left: 0; height: 100%; width: 4px; background: var(--accent); }
    .main-wrapper { margin-left: 240px; padding: 40px; }
    .summary-card { background: var(--card-bg); border-radius: 12px; padding: 25px; border: 1px solid var(--border); margin-bottom: 20px; text-align: center; }
    .market-watch-card { background: #24283b; border: 1px solid var(--border); border-radius: 10px; padding: 15px; text-align: center; }
    
    /* Blue Background Labels */
    .label-blue-bg { background-color: var(--accent); color: #fff; padding: 4px 12px; border-radius: 4px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; display: inline-block; }
    
    .bright-val { font-weight: 700; color: #fff; }
    .market-watch-card .bright-val { color: var(--yellow) !important; }
    .pnl-pos { color: var(--success); } .pnl-neg { color: var(--danger); }
    .table thead th { color: #9194a7; font-size: 0.75rem; text-transform: uppercase; border-bottom: 1px solid var(--border); }
    .table tbody td { padding: 15px; border-bottom: 1px solid #24283b; vertical-align: middle; }
    .badge-buy { background: rgba(80, 205, 137, 0.1); color: var(--success); border: 1px solid var(--success); }
    .badge-sell { background: rgba(241, 65, 108, 0.1); color: var(--danger); border: 1px solid var(--danger); }
  </style>
</head>
<body>

  <div class="sidebar">
    <div class="h3 fw-bold mb-5 text-center" style="letter-spacing: 2px;">FIXSTRA</div>
    <a href="#" class="nav-item"><i class="fa fa-th-large me-3"></i> Dashboard</a>
    <a href="#" class="nav-item active"><i class="fa fa-clock me-3"></i> Positions</a>
    <div style="margin-top: 100px;">
        <div class="small text-muted mb-2 text-uppercase fw-bold">Telegram System</div>
        <div id="tg-status-badge" class="badge w-100 mb-4 p-2">Inactive</div>
        
        <div class="text-center">
            <div id="last-update" class="label-blue-bg w-100" style="font-family: monospace; letter-spacing: 1px;">00:00:00</div>
        </div>
    </div>
  </div>

  <div class="main-wrapper">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold m-0">Positions</h4>
        <div id="market-status" class="badge bg-dark border border-primary text-primary">INITIALIZING</div>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-md-4"><div class="summary-card"><div class="mb-3"><span class="label-blue-bg">Total Investment</span></div><div class="h4 text-white fw-bold" id="total-inv">₹ 0.00</div></div></div>
        <div class="col-md-4"><div class="summary-card"><div class="mb-3"><span class="label-blue-bg">Current Value</span></div><div class="h4 text-white fw-bold" id="current-val">₹ 0.00</div></div></div>
        <div class="col-md-4"><div class="summary-card"><div class="mb-3"><span class="label-blue-bg">Profit/Loss</span></div><div class="h4 text-white fw-bold" id="total-pnl">₹ 0.00</div></div></div>
    </div>

    <div class="summary-card">
        <div class="label-blue-bg mb-4">Market Watch (1s Refresh)</div>
        <div class="row g-3" id="watch-grid"></div>
    </div>

    <div class="summary-card text-start">
        <table class="table table-dark table-borderless m-0">
            <thead><tr><th>TIME</th><th>SYMBOLS</th><th>TYPE</th><th>AVG. COST</th><th>LTP</th><th>P&L</th></tr></thead>
            <tbody id="position-body"></tbody>
        </table>
    </div>
  </div>

<script>
    const ws = new WebSocket(`ws://${window.location.host}/ws`);
    ws.onmessage = (event) => {
        try {
            const d = JSON.parse(event.data);
            const fmt = (v) => v.toLocaleString('en-IN', {minimumFractionDigits: 2});

            document.getElementById('market-status').innerText = d.market_status;
            document.getElementById('last-update').innerText = d.last_update;
            
            const tgBadge = document.getElementById('tg-status-badge');
            tgBadge.innerText = d.telegram_status;
            tgBadge.className = d.telegram_status === "Active" ? "badge bg-success w-100 mb-4 p-2" : "badge bg-danger w-100 mb-4 p-2";

            document.getElementById('total-inv').innerText = `₹ ${fmt(d.total_investment)}`;
            document.getElementById('current-val').innerText = `₹ ${fmt(d.current_value)}`;
            
            const pnlEl = document.getElementById('total-pnl');
            const totalPnL = d.total_pnl_combined || 0;
            pnlEl.innerText = `₹ ${fmt(totalPnL)}`;
            pnlEl.className = totalPnL >= 0 ? 'h4 text-success fw-bold' : 'h4 text-danger fw-bold';

            const grid = document.getElementById('watch-grid');
            grid.innerHTML = Object.entries(d.live_prices).map(([sym, price]) => {
                const open = d.open_prices[sym] || price;
                const change = open > 0 ? ((price - open) / open * 100).toFixed(2) : "0.00";
                return `<div class="col-md-2 col-6"><div class="market-watch-card"><div class="mb-2"><span class="label-blue-bg">${sym}</span></div><div class="h6 bright-val m-0">${fmt(price)}</div><div class="small ${change >= 0 ? 'text-success' : 'text-danger'}">(${change}%)</div></div></div>`;
            }).join('');

            const tbody = document.getElementById('position-body');
            const active = d.trades ? d.trades.filter(t => t.exit === "OPEN") : [];
            if (active.length > 0) {
                tbody.innerHTML = active.map(t => {
                    const lp = d.live_prices[t.symbol] || t.entry;
                    const pnlVal = (t.type === 'BUY' ? (lp - t.entry) : (t.entry - lp));
                    return `<tr>
                        <td>${t.time}</td>
                        <td class="fw-bold">${t.symbol}</td>
                        <td><span class="badge ${t.type === 'BUY' ? 'badge-buy' : 'badge-sell'} p-2">${t.type}</span></td>
                        <td>₹ ${fmt(t.entry)}</td>
                        <td class="${pnlVal>=0?'text-success':'text-danger'}">₹ ${fmt(lp)}</td>
                        <td class="fw-bold ${pnlVal>=0?'text-success':'text-danger'}">₹ ${fmt(pnlVal)}</td>
                    </tr>`;
                }).join('');
            } else { tbody.innerHTML = `<tr><td colspan="6" class="text-center py-5 text-muted">No active positions.</td></tr>`; }
        } catch (e) { console.error("Update Error:", e); }
    };
</script>
</body>
</html>
